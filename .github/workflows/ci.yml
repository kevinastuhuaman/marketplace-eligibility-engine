name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  frontend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        run: npm run build

      - name: Run mobile layout regression
        run: npx playwright test e2e/product-detail-layout.spec.ts

  python-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r services/eligibility-service/requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run evaluator unit tests
        run: pytest tests/test_evaluator.py -v
