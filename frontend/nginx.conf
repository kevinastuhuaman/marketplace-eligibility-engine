server {
    listen 3000;

    # Items (GET only)
    location /api/v1/items {
        limit_except GET { deny all; }
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass http://nginx:80;
        proxy_set_header Host $host;
    }

    # Evaluate (POST only)
    location /api/v1/evaluate {
        limit_except POST { deny all; }
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass http://nginx:80;
        proxy_set_header Host $host;
    }

    # Demo scenarios (GET only)
    location /api/v1/demo {
        limit_except GET { deny all; }
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass http://nginx:80;
        proxy_set_header Host $host;
    }

    # Sellers — exact list endpoint only
    location = /api/v1/sellers {
        limit_except GET { deny all; }
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass http://nginx:80;
        proxy_set_header Host $host;
    }

    # Sellers — item-specific 3P discovery only
    location ~ ^/api/v1/sellers/for-item/[0-9a-fA-F-]+$ {
        limit_except GET { deny all; }
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass http://nginx:80;
        proxy_set_header Host $host;
    }

    # Block all other seller routes (/{seller_id}, /{seller_id}/offers, etc.)
    location ~ ^/api/v1/sellers/ {
        default_type application/json;
        return 403 '{"error": "endpoint not exposed"}';
    }

    # Inventory availability (GET only)
    location /api/v1/inventory/availability {
        limit_except GET { deny all; }
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass http://nginx:80;
        proxy_set_header Host $host;
    }

    # Block all other /api/ paths
    location /api/ {
        default_type application/json;
        return 403 '{"error": "endpoint not exposed"}';
    }

    # SPA fallback
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
