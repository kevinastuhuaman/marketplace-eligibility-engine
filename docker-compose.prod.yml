services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: transactability
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db-init/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d transactability"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  item-service:
    build:
      context: ./services
      dockerfile: item-service/Dockerfile
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/transactability"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  eligibility-service:
    build:
      context: ./services
      dockerfile: eligibility-service/Dockerfile
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/transactability"
      REDIS_URL: "redis://redis:6379"
      ITEM_SERVICE_URL: "http://item-service:8000"
      INVENTORY_SERVICE_URL: "http://inventory-service:8000"
      SELLER_SERVICE_URL: "http://seller-service:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      item-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      seller-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  inventory-service:
    build:
      context: ./services
      dockerfile: inventory-service/Dockerfile
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/transactability"
      REDIS_URL: "redis://redis:6379"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  seller-service:
    build:
      context: ./services
      dockerfile: seller-service/Dockerfile
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/transactability"
      REDIS_URL: "redis://redis:6379"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /dev/null:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      item-service:
        condition: service_healthy
      eligibility-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      seller-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    environment:
      API_GATEWAY_URL: "http://nginx:80"
      REDIS_URL: "redis://redis:6379"
    depends_on:
      nginx:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      dashboard:
        condition: service_started
    restart: unless-stopped

  seed:
    build:
      context: ./services
      dockerfile: eligibility-service/Dockerfile
    command: python -m scripts.seed
    working_dir: /seed
    volumes:
      - ./scripts:/seed/scripts
      - ./services/shared:/seed/shared
    environment:
      SEED_BASE_URL: "http://nginx:80"
    depends_on:
      eligibility-service:
        condition: service_healthy
      nginx:
        condition: service_healthy
    profiles: ["seed"]
    restart: "no"

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test
    command: ["pytest", "/app/tests/test_scenarios.py", "-v", "--tb=short"]
    working_dir: /app
    volumes:
      - ./tests:/app/tests
      - ./services/shared:/app/shared
    environment:
      TEST_BASE_URL: "http://nginx:80"
    depends_on:
      eligibility-service:
        condition: service_healthy
      nginx:
        condition: service_healthy
    profiles: ["test"]
    restart: "no"

volumes:
  postgres_data:
    name: transactability_pg_data
  redis_data:
    name: transactability_redis_data
  caddy_data:
  caddy_config:
