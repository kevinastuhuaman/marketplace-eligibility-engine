worker_processes auto;

events {
    worker_connections 1024;
}

http {
    upstream item_service {
        server item-service:8000;
    }

    upstream eligibility_service {
        server eligibility-service:8000;
    }

    upstream inventory_service {
        server inventory-service:8000;
    }

    upstream seller_service {
        server seller-service:8000;
    }

    server {
        listen 80;
        server_name localhost;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;

        # --- Item Service ---
        location /v1/items {
            proxy_pass http://item_service;
        }

        # --- Eligibility Service ---
        location /v1/evaluate {
            proxy_pass http://eligibility_service;
        }

        location /v1/rules {
            proxy_pass http://eligibility_service;
        }

        location /v1/audit {
            proxy_pass http://eligibility_service;
        }

        location /v1/fulfillment-paths {
            proxy_pass http://eligibility_service;
        }

        location /v1/markets {
            proxy_pass http://eligibility_service;
        }

        # --- Demo Scenarios ---
        location /v1/demo {
            proxy_pass http://eligibility_service;
        }

        # --- Inventory Service ---
        location /v1/inventory {
            proxy_pass http://inventory_service;
        }

        # --- Seller Service ---
        location /v1/sellers {
            proxy_pass http://seller_service;
        }

        # --- Gateway Health ---
        location /health {
            default_type application/json;
            return 200 '{"status":"healthy","service":"gateway"}';
        }
    }
}
