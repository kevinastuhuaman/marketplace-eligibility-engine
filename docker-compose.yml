version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: transactability
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db-init/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d transactability"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  item-service:
    build:
      context: ./services
      dockerfile: item-service/Dockerfile
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/transactability?options=-c%20search_path=item_svc"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  eligibility-service:
    build:
      context: ./services
      dockerfile: eligibility-service/Dockerfile
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/transactability?options=-c%20search_path=eligibility_svc"
      REDIS_URL: "redis://redis:6379"
      ITEM_SERVICE_URL: "http://item-service:8000"
      INVENTORY_SERVICE_URL: "http://inventory-service:8000"
      SELLER_SERVICE_URL: "http://seller-service:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      item-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      seller-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  inventory-service:
    build:
      context: ./services
      dockerfile: inventory-service/Dockerfile
    ports:
      - "8003:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/transactability?options=-c%20search_path=inventory_svc"
      REDIS_URL: "redis://redis:6379"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  seller-service:
    build:
      context: ./services
      dockerfile: seller-service/Dockerfile
    ports:
      - "8004:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/transactability?options=-c%20search_path=seller_svc"
      REDIS_URL: "redis://redis:6379"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      item-service:
        condition: service_healthy
      eligibility-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      seller-service:
        condition: service_healthy

  dashboard:
    build: ./dashboard
    ports:
      - "8501:8501"
    environment:
      API_GATEWAY_URL: "http://nginx:80"
      REDIS_URL: "redis://redis:6379"
    depends_on:
      nginx:
        condition: service_started
      redis:
        condition: service_healthy

volumes:
  postgres_data:
